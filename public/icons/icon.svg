  <rect x="165" y="260" width="60" height="180" rx="8" fill="white" fill-opacity="0.9"/>
  <rect x="250" y="290" width="60" height="150" rx="8" fill="white" fill-opacity="0.9"/>
  <rect x="335" y="200" width="60" height="240" rx="8" fill="white" fill-opacity="0.9"/>
  <!-- Trend line -->
